# Render Blueprint — staging environment.
# Render only reads this file from the repo root (render.yaml); it cannot
# live in a subdirectory. Synced services auto-deploy on push to `branch`.
services:
  - type: web
    name: spendrift-api-staging
    runtime: docker
    plan: free
    region: singapore
    branch: dev
    healthCheckPath: /health
    envVars:
      # Render's connection string is postgresql://..., which SQLAlchemy
      # resolves to the psycopg2 driver already in the image.
      - key: DATABASE_URL
        fromDatabase:
          name: spendrift-db-staging
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: http://localhost:3000, https://spendrift-fe-dev.vercel.app
      # The Dockerfile CMD binds 8000; tell Render's router to use it.
      - key: PORT
        value: "8000"
      # Trust X-Forwarded-For from Render's proxy so SlowAPI rate limits
      # key on the real client IP, not the proxy's. Safe here: only the
      # proxy can reach the container.
      - key: FORWARDED_ALLOW_IPS
        value: "*"

databases:
  - name: spendrift-db-staging
    plan: free
    region: singapore
    postgresMajorVersion: "18"
